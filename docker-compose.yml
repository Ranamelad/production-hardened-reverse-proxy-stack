version: '3.8'

services:
  app:
    build: ./app
    container_name: app
    restart: always
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    networks:
      - webnet

  proxy:
    build: ./proxy
    container_name: proxy
    restart: always
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    ports:
      - "8080:8080"
    networks:
      - webnet

networks:
  webnet:
    internal: true